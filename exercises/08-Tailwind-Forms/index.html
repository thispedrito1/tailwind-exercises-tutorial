<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<script src="https://cdn.tailwindcss.com"></script>
		<title>08 Tailwind Forms</title>
	</head>
	<body>
		<div class="col-3 mx-auto my-5">
			<!-- Add your code below this line -->
			<form class="bg-gray-700 rounded p-6 max-w-md mx-auto text-white">
				<h2 class="text-2xl font-semibold mb-4">Please login</h2>
				<input type="email" placeholder="Email Address" class="w-full mb-3 px-3 py-2 rounded text-gray-900" />
				<input type="password" placeholder="Password" class="w-full mb-3 px-3 py-2 rounded text-gray-900" />
				<label class="flex items-center mb-4">
					<input type="checkbox" class="mr-2" />
					<span>Remember me</span>
				</label>
				<button class="w-full bg-blue-600 text-white py-2 rounded">Login</button>
			</form>
		</div>
	</body>
</html>
